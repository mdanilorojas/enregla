<!DOCTYPE html>
<html>
<head>
    <title>Check Auth</title>
</head>
<body>
    <h1>Testing Auth State</h1>
    <div id="output"></div>
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        
        const supabase = createClient(
            'https://pxqmzxrnwdwcpgybpvnf.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4cW16eHJud2R3Y3BneWJwdm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ1MDU5MDcsImV4cCI6MjA2MDA4MTkwN30.R97RXqV9YBiD5L5eXbIK-5Y8Oqkd7gI29kTPD38HoLk'
        );
        
        const { data: { session } } = await supabase.auth.getSession();
        const output = document.getElementById('output');
        
        if (session) {
            const { data: profile } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', session.user.id)
                .single();
            
            output.innerHTML = `
                <p><strong>Logged in:</strong> ${session.user.email}</p>
                <p><strong>Has company_id:</strong> ${profile?.company_id || 'NO'}</p>
                <pre>${JSON.stringify(profile, null, 2)}</pre>
            `;
        } else {
            output.innerHTML = '<p><strong>NOT LOGGED IN</strong></p>';
        }
    </script>
</body>
</html>
